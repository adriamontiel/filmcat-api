name: Cache cinema showtimes

on:
  schedule:
    - cron: '5 * * * *'   # Cada hora a HH:05 (evitem la tromba de l'hora en punt)
  workflow_dispatch:        # Disparo manual des del panell de GitHub

jobs:
  cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Necessari per fer git push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch cinema JSON data
        run: node scripts/cache-cinemas.js

      - name: Commit i push fitxers de cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/
          # Només fa commit si hi ha canvis reals (evita commits buits)
          git diff --staged --quiet && echo "Cap canvi, res a fer." || (
            git commit -m "chore: update cinema cache [$(date -u +'%Y-%m-%dT%H:%MZ')]" &&
            git push
          )
